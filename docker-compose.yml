services:
  # ─── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: webportalvip-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mywebportal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: LeMinhLong123!
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mywebportal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webportal
    dns:
      - 8.8.8.8
      - 1.1.1.1

  # ─── Backend Node.js API ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webportalvip-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - webportal
    dns:
      - 8.8.8.8
      - 1.1.1.1

  # ─── Frontend React + Nginx ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webportalvip-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - webportal

volumes:
  postgres_data:

networks:
  webportal:
    driver: bridge
